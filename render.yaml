# Render Blueprint — backend API + Postgres only.
# The frontend is deployed separately on Vercel (see frontend/vercel.json).
databases:
  - name: po-tracker-db
    plan: free
    databaseName: potracker
    user: potracker

services:
  - type: web
    name: po-tracker-api
    runtime: node
    plan: starter
    rootDir: backend
    buildCommand: npm ci && npm run build && npx prisma generate
    startCommand: npx prisma migrate deploy && node dist/seed.js && node dist/index.js
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: po-tracker-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: SUPER_ADMIN_EMAIL
        sync: false
      - key: SUPER_ADMIN_PASSWORD
        sync: false
      - key: FRONTEND_URL
        sync: false # e.g. https://tracker.mulkinternational.co,https://po-tracker-eight.vercel.app
      - key: NODE_ENV
        value: production
