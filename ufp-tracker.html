<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>UFP Order Tracker</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  body { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
  .stage-pill { font-size: 11px; padding: 2px 8px; border-radius: 999px; white-space: nowrap; }
  .tbl th { background:#f8fafc; font-weight:600; font-size:11px; text-transform:uppercase; color:#475569; border-bottom:1px solid #e2e8f0; padding:8px 10px; text-align:left; position:sticky; top:0; }
  .tbl td { padding:8px 10px; border-bottom:1px solid #f1f5f9; font-size:13px; vertical-align:top; }
  .tbl tr:hover td { background:#f8fafc; }
  .pipeline-step { flex:1; padding:6px 4px; text-align:center; font-size:10px; color:#94a3b8; border-bottom:3px solid #e2e8f0; }
  .pipeline-step.done { color:#16a34a; border-color:#16a34a; }
  .pipeline-step.current { color:#2563eb; border-color:#2563eb; font-weight:600; }
  .drawer { transition: transform .25s ease; }
  .role-badge { font-size:11px; padding:2px 8px; border-radius:6px; background:#eef2ff; color:#4338ca; }
  details > summary { cursor:pointer; list-style:none; }
  details > summary::-webkit-details-marker { display:none; }
  .scroll-fade { mask-image: linear-gradient(to bottom, black 90%, transparent 100%); }
</style>
</head>
<body class="bg-slate-50 text-slate-800">

<!-- TOP BAR -->
<header class="bg-white border-b border-slate-200 sticky top-0 z-30">
  <div class="max-w-[1600px] mx-auto px-6 py-3 flex items-center gap-4">
    <div class="flex items-center gap-3">
      <div class="w-9 h-9 rounded-lg bg-indigo-600 text-white grid place-items-center font-bold">U</div>
      <div>
        <div class="font-semibold text-slate-900 leading-tight">UFP Order Tracker</div>
        <div class="text-[11px] text-slate-500 leading-tight">PO → Production → Shipping → Delivery</div>
      </div>
    </div>
    <nav class="ml-6 flex gap-1" id="tabnav">
      <button data-tab="dashboard" class="tab-btn px-3 py-2 text-sm rounded-md hover:bg-slate-100">Dashboard</button>
      <button data-tab="orders" class="tab-btn px-3 py-2 text-sm rounded-md hover:bg-slate-100">Orders</button>
      <button data-tab="upload" class="tab-btn px-3 py-2 text-sm rounded-md hover:bg-slate-100">Upload PO</button>
      <button data-tab="items" class="tab-btn px-3 py-2 text-sm rounded-md hover:bg-slate-100">Item Summary</button>
      <button data-tab="pricing" class="tab-btn px-3 py-2 text-sm rounded-md hover:bg-slate-100">Pricing</button>
      <button data-tab="master" class="tab-btn px-3 py-2 text-sm rounded-md hover:bg-slate-100">Master Data</button>
    </nav>
    <div class="ml-auto flex items-center gap-3">
      <select id="roleSwitcher" class="text-sm border border-slate-300 rounded-md px-2 py-1.5 bg-white">
        <option value="HQ_SALES">HQ / Sales</option>
        <option value="UAE_JEBEL_ALI">UAE – Jebel Ali</option>
        <option value="UAE_SHARJAH">UAE – Sharjah</option>
        <option value="UAE_ABU_DHABI">UAE – Abu Dhabi</option>
        <option value="LOGISTICS">Logistics</option>
        <option value="VIEWER">Viewer (read-only)</option>
      </select>
      <span id="roleBadge" class="role-badge">HQ / Sales</span>
      <div class="relative">
        <button id="menuBtn" class="px-2 py-1.5 text-sm rounded-md border border-slate-300 hover:bg-slate-100">⋯</button>
        <div id="menuDropdown" class="hidden absolute right-0 mt-1 w-48 bg-white border border-slate-200 rounded-md shadow-lg text-sm z-40">
          <button class="block w-full text-left px-3 py-2 hover:bg-slate-50" onclick="exportData()">Export data (JSON)</button>
          <button class="block w-full text-left px-3 py-2 hover:bg-slate-50" onclick="document.getElementById('importFile').click()">Import data (JSON)</button>
          <button class="block w-full text-left px-3 py-2 hover:bg-slate-50" onclick="exportCsv()">Export Orders CSV</button>
          <button class="block w-full text-left px-3 py-2 hover:bg-slate-50 text-red-600" onclick="resetData()">Reset to sample data</button>
          <input type="file" id="importFile" accept="application/json" class="hidden" onchange="importData(event)">
        </div>
      </div>
    </div>
  </div>
</header>

<main class="max-w-[1600px] mx-auto px-6 py-6" id="main">
  <!-- Tabs will be rendered here -->
</main>

<!-- DRAWER (PO detail) -->
<div id="drawerOverlay" class="hidden fixed inset-0 bg-black/30 z-40" onclick="closeDrawer()"></div>
<aside id="drawer" class="drawer fixed top-0 right-0 h-full w-[720px] max-w-full bg-white shadow-2xl z-50 translate-x-full overflow-y-auto"></aside>

<!-- TOAST -->
<div id="toast" class="hidden fixed bottom-6 right-6 bg-slate-900 text-white text-sm px-4 py-2 rounded-md shadow-lg z-50"></div>

  "PO Received":["HQ_SALES"],
  "Proforma Invoice Sent":["HQ_SALES"],
  "Downpayment Received":["HQ_SALES"],
  "In Production":["UAE_JEBEL_ALI","UAE_SHARJAH","UAE_ABU_DHABI"],

};

/* ============================================================
   STATE + PERSISTENCE
   ============================================================ */
const LS_KEY = "ufp_tracker_state_v1";
let state = loadState();
let currentTab = "dashboard";

function loadState() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e){}
  return seedState();
}
function seedState() {
  const pos = SEED.pos.map((p, i) => normalizePO(p, i));
  return { pos, master: SEED.master, pricing: SEED.pricing, currentRole: "HQ_SALES", nextId: pos.length + 1 };
}
function saveState() { localStorage.setItem(LS_KEY, JSON.stringify(state)); }
function resetData() {
  if (!confirm("Reset all data to sample seed? This wipes local changes.")) return;
  localStorage.removeItem(LS_KEY);
  state = seedState();
  render();
  toast("Reset to sample data");
}
function exportData() {
  const blob = new Blob([JSON.stringify(state, null, 2)], {type:"application/json"});
  download(blob, `ufp-tracker-${new Date().toISOString().slice(0,10)}.json`);
}
function importData(ev) {
  const f = ev.target.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = () => {
    try { state = JSON.parse(r.result); saveState(); render(); toast("Data imported"); }
    catch(e){ alert("Invalid JSON file"); }
  };
  r.readAsText(f);
}
function exportCsv() {
  const cols = ["poNo","rev","status","poDate","stockingLocation","productionSite","portOfDest","poValue","totalM2","skids","piNo","piDate","piValue","dpDate","dpAmount","productionEtc","containerNo","bol","shippingLine","actualDeparture","shippingEta","ciNo","ciDate","freight","inland","ciValue","balanceDue","bpDate","bpAmount","telexDate","arrivalDate"];
  const head = cols.join(",");
  const rows = state.pos.map(p => cols.map(c => csvCell(p[c])).join(","));
  const blob = new Blob([head+"\n"+rows.join("\n")], {type:"text/csv"});
  download(blob, `ufp-orders-${new Date().toISOString().slice(0,10)}.csv`);
}
function csvCell(v) {
  if (v == null) return "";
  const s = String(v).replace(/"/g,'""');
  return /[,"\n]/.test(s) ? `"${s}"` : s;
}
function download(blob, name) {
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob); a.download = name; a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 1000);
}
function normalizePO(p, idx) {
  return {
    id: p.id ?? idx + 1,
    poNo: String(p.poNo ?? ""),
    rev: p.rev ?? 0,
    status: p.status ?? "PO Received",
    poDate: p.poDate ?? "",
    active: p.active ?? true,
    skids: p.skids ?? sumLines(p.lines, "skids"),
    stockingLocation: p.stockingLocation ?? "",
    portOfDest: p.portOfDest ?? "",
    poValue: p.poValue ?? sumLines(p.lines, "extPo"),
    totalM2: p.totalM2 ?? sumLines(p.lines, "qtyM2"),
    productionSite: p.productionSite ?? "",
    productionStart: p.productionStart ?? "",
    productionEtc: p.productionEtc ?? "",
    piNo: p.piNo ?? "", piDate: p.piDate ?? "", piValue: p.piValue ?? "",
    dpDate: p.dpDate ?? "", dpAmount: p.dpAmount ?? "",
    ciNo: p.ciNo ?? "", ciDate: p.ciDate ?? "", ciValue: p.ciValue ?? "",
    freight: p.freight ?? "", inland: p.inland ?? "", balanceDue: p.balanceDue ?? "",
    bpDate: p.bpDate ?? "", bpAmount: p.bpAmount ?? "", telexDate: p.telexDate ?? "",
    containerNo: p.containerNo ?? "", bol: p.bol ?? "", isf: p.isf ?? "",
    shippingLine: p.shippingLine ?? "", shippingEta: p.shippingEta ?? "",
    actualDeparture: p.actualDeparture ?? "", arrivalDate: p.arrivalDate ?? "",
    lines: (p.lines || []).map(l => ({ ...l })),
    history: p.history || [{stage:"PO Received", by:"seed", at: p.poDate || todayISO(), note:"Seeded record"}],
    notes: p.notes || ""
  };
}
function sumLines(lines, key) { return (lines||[]).reduce((s,l)=>s+(Number(l[key])||0),0); }
function todayISO() { return new Date().toISOString().slice(0,10); }
function fmtMoney(v) { if (v==null||v==="") return ""; const n=Number(v); if (isNaN(n)) return v; return "$"+n.toLocaleString(undefined,{maximumFractionDigits:2}); }
function fmtNum(v, d=2) { if (v==null||v==="") return ""; const n=Number(v); if (isNaN(n)) return v; return n.toLocaleString(undefined,{maximumFractionDigits:d}); }
function fmtDate(v) { return v || ""; }
function daysBetween(a, b) { if (!a||!b) return ""; const d=(new Date(b)-new Date(a))/86400000; return isFinite(d)?Math.round(d):""; }
function stagePillHtml(s) { return `<span class="stage-pill ${STAGE_COLORS[s]||"bg-slate-100 text-slate-700"}">${s||""}</span>`; }
function roleLabel(r) { return ({HQ_SALES:"HQ / Sales",UAE_JEBEL_ALI:"UAE – Jebel Ali",UAE_SHARJAH:"UAE – Sharjah",UAE_ABU_DHABI:"UAE – Abu Dhabi",LOGISTICS:"Logistics",VIEWER:"Viewer"})[r]||r; }
function canAdvance(stage, role) { return (STAGE_OWNERS[stage]||[]).includes(role); }
function stageIndex(s) { const i=STAGES.indexOf(s); return i<0?0:i; }

function toast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.remove("hidden");
  clearTimeout(window._toastT);
  window._toastT = setTimeout(()=>t.classList.add("hidden"), 2400);
}

/* ============================================================
   ROUTING / RENDER
   ============================================================ */
function render() {
  document.querySelectorAll(".tab-btn").forEach(b => {
    b.classList.toggle("bg-slate-900", b.dataset.tab===currentTab);
    b.classList.toggle("text-white", b.dataset.tab===currentTab);
  });
  const main = document.getElementById("main");
  if (currentTab==="dashboard") main.innerHTML = renderDashboard();
  else if (currentTab==="orders") main.innerHTML = renderOrders();
  else if (currentTab==="upload") main.innerHTML = renderUpload();
  else if (currentTab==="items") main.innerHTML = renderItemSummary();
  else if (currentTab==="pricing") main.innerHTML = renderPricing();
  else if (currentTab==="master") main.innerHTML = renderMaster();
  if (currentTab==="dashboard") setTimeout(drawDashboardCharts, 30);
  if (currentTab==="upload") wireUpload();
  if (currentTab==="orders") wireOrders();
}

document.addEventListener("DOMContentLoaded", () => {
  document.querySelectorAll(".tab-btn").forEach(b => b.addEventListener("click", () => { currentTab=b.dataset.tab; render(); }));
  document.getElementById("roleSwitcher").addEventListener("change", e => {
    state.currentRole = e.target.value;
    document.getElementById("roleBadge").textContent = roleLabel(state.currentRole);
    saveState(); render();
  });
  document.getElementById("roleSwitcher").value = state.currentRole;
  document.getElementById("roleBadge").textContent = roleLabel(state.currentRole);
  document.getElementById("menuBtn").addEventListener("click", () => document.getElementById("menuDropdown").classList.toggle("hidden"));
  document.addEventListener("click", e => {
    if (!e.target.closest("#menuBtn") && !e.target.closest("#menuDropdown")) document.getElementById("menuDropdown").classList.add("hidden");
  });
  render();
});

/* ============================================================
   DASHBOARD
   ============================================================ */
function renderDashboard() {
  const locs = state.master.stockingLocations;
  const pivot = {};
  STAGES.forEach(s => { pivot[s] = {}; locs.forEach(l => pivot[s][l]=0); pivot[s].TOTAL=0; });
  state.pos.filter(p=>p.active!==false).forEach(p => {
    if (!pivot[p.status]) return;
    const l = p.stockingLocation;
    if (l && pivot[p.status][l]!=null) pivot[p.status][l]++;
    pivot[p.status].TOTAL++;
  });
  const totalsByLoc = {}; locs.forEach(l => totalsByLoc[l] = STAGES.reduce((s,st)=>s+pivot[st][l],0));
  const grandTotal = STAGES.reduce((s,st)=>s+pivot[st].TOTAL,0);

  // KPIs
  const active = state.pos.filter(p=>p.active!==false);
  const openCount = active.filter(p => stageIndex(p.status) < stageIndex("Arrived")).length;
  const arrivedCount = active.filter(p => p.status==="Arrived").length;
  const totalValue = active.reduce((s,p)=>s+(Number(p.poValue)||0),0);
  const totalM2 = active.reduce((s,p)=>s+(Number(p.totalM2)||0),0);

  // Cycle time averages
  const avg = (arr) => { const x=arr.filter(n=>typeof n==="number"&&isFinite(n)); return x.length? (x.reduce((a,b)=>a+b,0)/x.length).toFixed(1):"—"; };
  const poToPi = avg(active.map(p=>daysBetween(p.poDate,p.piDate)).filter(n=>typeof n==="number"));
  const piToDp = avg(active.map(p=>daysBetween(p.piDate,p.dpDate)).filter(n=>typeof n==="number"));
  const dpToShip = avg(active.map(p=>daysBetween(p.dpDate,p.actualDeparture)).filter(n=>typeof n==="number"));
  const ciToBp = avg(active.map(p=>daysBetween(p.ciDate,p.bpDate)).filter(n=>typeof n==="number"));
  const bpToTelex = avg(active.map(p=>daysBetween(p.bpDate,p.telexDate)).filter(n=>typeof n==="number"));

  // Color volumes
  const colorVol = {};
  active.forEach(p => p.lines.forEach(l => {
    const k = l.color || "—";
    colorVol[k] = colorVol[k] || {sheets:0, msf:0, m2:0, value:0};
    colorVol[k].sheets += Number(l.sheets)||0;
    colorVol[k].msf += Number(l.qtyMsf)||0;
    colorVol[k].m2 += Number(l.qtyM2)||0;
    colorVol[k].value += Number(l.extPo)||0;
  }));

  return `
  <div class="grid grid-cols-4 gap-4 mb-6">
    ${kpi("Open Orders", openCount, "bg-blue-50 text-blue-700")}
    ${kpi("Arrived", arrivedCount, "bg-emerald-50 text-emerald-700")}
    ${kpi("Total PO Value", fmtMoney(totalValue), "bg-violet-50 text-violet-700")}
    ${kpi("Total M²", fmtNum(totalM2,0), "bg-amber-50 text-amber-700")}
  </div>

  ${state.currentRole === "HQ_SALES" ? renderMonthlyPanel() : ""}
  ${state.currentRole === "HQ_SALES" ? renderCapacityPanel() : ""}

  <div class="grid grid-cols-3 gap-4 mb-6">
    <div class="col-span-2 bg-white rounded-lg border border-slate-200 p-4">
      <div class="flex items-center justify-between mb-3">
        <div class="font-semibold text-slate-900">Order status by stocking location</div>
        <div class="text-xs text-slate-500">Active orders only</div>
      </div>
      <div class="overflow-x-auto">
        <table class="tbl w-full">
          <thead><tr>
            <th>Stage</th>
            ${locs.map(l=>`<th class="text-right">${l.split(",")[0]}</th>`).join("")}
            <th class="text-right">Total</th>
          </tr></thead>
          <tbody>
            ${STAGES.map(s=>`

/* ============================================================
   MONTHLY SALES PANEL (HQ/Sales only)
   Revenue: invoiced value (CI value by CI date)
              fallback to PO value by PO date when CI not yet sent
   M² invoiced: totalM2 by CI date (fallback PO date)
   Containers shipped: count of POs with actualDeparture in that month
   ============================================================ */
function computeMonthlyMetrics(year) {
  const months = Array.from({length:12}, () => ({ revenue:0, m2:0, containers:0, m2Shipped:0, orders:0, paid:0 }));
  state.pos.filter(p => p.active !== false).forEach(p => {
    // Revenue + invoiced M²: prefer CI date/value, fallback to PO date/value
    const invDate = p.ciDate || p.poDate;
    const invValue = Number(p.ciValue) || Number(p.poValue) || 0;
    const invM2 = Number(p.totalM2) || 0;
    if (invDate) {
      const d = new Date(invDate);
      if (!isNaN(d) && d.getFullYear() === year) {
        const mi = d.getMonth();
        months[mi].revenue += invValue;
        months[mi].m2 += invM2;
        months[mi].orders += 1;
      }
    }
    // Containers + m² shipped from Dubai: by actual departure
    if (p.actualDeparture) {
      const d = new Date(p.actualDeparture);
      if (!isNaN(d) && d.getFullYear() === year) {
        months[d.getMonth()].containers += 1;
        months[d.getMonth()].m2Shipped += Number(p.totalM2) || 0;
      }
    }
    // Cash collected (balance + downpayment) in this year
    [["bpDate","bpAmount"],["dpDate","dpAmount"]].forEach(([dk,ak]) => {
      if (p[dk]) {
        const d = new Date(p[dk]);
        if (!isNaN(d) && d.getFullYear() === year) months[d.getMonth()].paid += Number(p[ak])||0;
      }
    });
  });
  return months;
}
function availableYears() {
  const ys = new Set([new Date().getFullYear()]);
  state.pos.forEach(p => {
    [p.poDate, p.ciDate, p.actualDeparture, p.bpDate].forEach(d => {
      if (d) { const y = new Date(d).getFullYear(); if (!isNaN(y)) ys.add(y); }
    });
  });
  return Array.from(ys).sort((a,b)=>b-a);
}

/* ============================================================
   CAPACITY vs ACTUAL (HQ/Sales only) — Dubai production
   Defaults: 2 lines × 3,000 m²/line/day, 8,300 m² per container
   Working days/month configurable (default 26 — UAE 6-day week)
   ============================================================ */
function getCapacityConfig() {
  const m = state.master;
  return {
    lines:               Number(m.productionLines)     || 2,
    m2PerLinePerDay:     Number(m.m2PerLinePerDay)     || 3000,
    m2PerContainer:      Number(m.m2PerContainer)      || 8300,
    workingDaysPerMonth: Number(m.workingDaysPerMonth) || 26
  };
}
function saveCapacityConfig(patch) {
  Object.assign(state.master, patch);
  saveState();
}
function monthDaysFor(year, monthIdx, workingDays) {
  // If selected year is in the past or before today, use full working-day allocation.
  // For the current month (partial), pro-rate by today's day-of-month vs days in month.
  const today = new Date();
  if (year < today.getFullYear()) return workingDays;
  if (year > today.getFullYear()) return workingDays;
  if (monthIdx < today.getMonth()) return workingDays;
  if (monthIdx > today.getMonth()) return workingDays;
  const daysInMonth = new Date(year, monthIdx+1, 0).getDate();
  return Math.max(1, Math.round(workingDays * (today.getDate() / daysInMonth)));
}
function computeMonthlyCapacity(year) {
  const c = getCapacityConfig();
  const months = computeMonthlyMetrics(year);
  return months.map((m, i) => {
    const wd = monthDaysFor(year, i, c.workingDaysPerMonth);
    const capM2 = c.lines * c.m2PerLinePerDay * wd;
    const capContainers = capM2 / c.m2PerContainer;
    const utilM2  = capM2 ? (m.m2Shipped / capM2) * 100 : 0;
    const utilCon = capContainers ? (m.containers / capContainers) * 100 : 0;
    return {
      ...m,
      workingDays: wd,
      capM2,
      capContainers,
      utilM2,
      utilCon
    };
  });
}

      interaction: { mode:"index", intersect:false },
      plugins: {
        legend: { position:"bottom", labels:{ boxWidth:12, font:{ size:11 } } },
        tooltip: { callbacks: {
          label: (c) => {
            if (c.dataset.label.startsWith("Utilization")) return `Utilization: ${c.parsed.y}%`;

            return `Actual: ${c.parsed.y} ctr`;
          }
        } }
      },
      scales: {
        y:  { position:"left", title:{ display:true, text:"Containers" }, beginAtZero:true },
        y1: { position:"right", title:{ display:true, text:"Utilization %" }, beginAtZero:true, suggestedMax:120, grid:{ drawOnChartArea:false }, ticks:{ callback:v=>v+"%" } }
      }
    }
  });
}

function drawDashboardCharts() {
  if (state.currentRole === "HQ_SALES") { drawMonthlyChart(); drawCapacityChart(); }
  const ctx = document.getElementById("statusChart"); if (!ctx) return;
  const counts = {};
  state.pos.filter(p=>p.active!==false).forEach(p => counts[p.status]=(counts[p.status]||0)+1);
  const labels = Object.keys(counts); const data = Object.values(counts);
  const palette = ["#64748b","#f59e0b","#eab308","#fb923c","#3b82f6","#06b6d4","#8b5cf6","#6366f1","#10b981","#ec4899","#ef4444"];
  const chart = new Chart(ctx, {
    type: "doughnut",
    data: { labels, datasets: [{ data, backgroundColor: labels.map((_,i)=>palette[i%palette.length]) }] },
    options: {
      plugins: {
        legend: {
          position: "bottom",
          labels: { boxWidth: 10, font: { size: 10 } },
          onClick: (e, item) => openStatusDetail(item.text)
        },
        tooltip: { callbacks: { afterLabel: () => "Click for details" } }
      },
      onClick: (evt, els) => {
        if (!els.length) return;
        const label = chart.data.labels[els[0].index];
        openStatusDetail(label);
      },
      onHover: (evt, els) => { if (evt.native) evt.native.target.style.cursor = els.length ? "pointer" : "default"; }
    }
  });
  const hint = document.createElement("div");
  hint.className = "text-[10px] text-slate-400 text-center mt-2";
  hint.textContent = "Click any slice or legend item for the PO list";
  ctx.parentElement.appendChild(hint);
}

      <td>${fmtDate(p.actualDeparture)||"<span class='text-slate-300'>—</span>"}</td>

      <div class="bg-white rounded-lg shadow-2xl w-[1280px] max-w-full max-h-[90vh] flex flex-col">

          ${stagePillHtml(status)}

            <div class="text-xs text-slate-500">${fmtMoney(totalValue)} · ${fmtNum(totalM2,0)} m² · ${totalSkids} skids</div>

  const p = state.pos.find(x=>x.id===id);

          <div class="font-semibold">Advance to: ${next}</div>

        <div class="px-5 py-3 border-t border-slate-200 flex items-center gap-2">

}

      {k:"dpDate",label:"DP Date",type:"date",def:todayISO()},
      {k:"dpAmount",label:"DP Amount (USD)",type:"number"}

      {k:"productionSite",label:"Production site",type:"select",options:state.master.uaeSites,def:roleToSite(state.currentRole)},

      {k:"productionEtc",label:"Production ETC (ready to load)",type:"date"}

    "Container Loaded":[
      {k:"containerNo",label:"Container #",type:"text"},

      {k:"ciNo",label:"CI Number",type:"text"},
      {k:"ciDate",label:"CI Date",type:"date",def:todayISO()},
      {k:"freight",label:"Freight",type:"number",def:state.master.freight},
      {k:"inland",label:"Inland",type:"number",def:state.master.inland},
      {k:"ciValue",label:"CI Value (USD)",type:"number"},
      {k:"balanceDue",label:"Balance due (USD)",type:"number"}
    ],
    "Balance Payment Received":[
      {k:"bpDate",label:"BP Date",type:"date",def:todayISO()},
      {k:"bpAmount",label:"BP Amount (USD)",type:"number"}
    ],
    "Telex / Seaway Released":[
      {k:"telexDate",label:"Telex / SW release date",type:"date",def:todayISO()}
    ],
    "Arrived":[
      {k:"arrivalDate",label:"Actual arrival at port",type:"date",def:todayISO()},
      {k:"shippingEta",label:"Confirmed ETA (if revised)",type:"date"}

function roleToSite(role) {
  return ({UAE_JEBEL_ALI:"UAE - Jebel Ali", UAE_SHARJAH:"UAE - Sharjah", UAE_ABU_DHABI:"UAE - Abu Dhabi"})[role] || "";
}
function renderInput(f, p) {
  const cur = p[f.k] || f.def || "";
  if (f.type==="select") {
    return `<div><label class="text-xs text-slate-500">${f.label}</label>
      <select id="adv_${f.k}" class="w-full border border-slate-300 rounded-md px-2 py-1.5 text-sm">
        <option value="">—</option>
        ${(f.options||[]).map(o=>`<option ${cur===o?"selected":""} value="${o}">${o}</option>`).join("")}
      </select></div>`;
  }
  return `<div><label class="text-xs text-slate-500">${f.label}</label>
    <input id="adv_${f.k}" type="${f.type}" value="${cur}" class="w-full border border-slate-300 rounded-md px-2 py-1.5 text-sm"></div>`;
}
function commitAdvance(id, next) {
  const p = state.pos.find(x=>x.id===id); if (!p) return;
  const flds = stageFields(next, p);
  flds.forEach(f => {
    const el = document.getElementById("adv_"+f.k);
    if (el) p[f.k] = el.value;
  });
  const note = document.getElementById("advNote").value;
  p.status = next;
  p.history.push({stage: next, by: state.currentRole, at: todayISO(), note});
  saveState();
  document.getElementById("advWrap").remove();
  openDrawer(id);
  render();
  toast(`PO ${p.poNo} advanced to ${next}`);
}

        <div class="px-5 py-3 border-t border-slate-200 flex items-center gap-2">
          <button onclick="document.getElementById('editWrap').remove()" class="ml-auto px-3 py-1.5 text-sm rounded-md border border-slate-300">Cancel</button>
          <button onclick='saveEdit(${id}, ${JSON.stringify(editable)})' class="px-3 py-1.5 text-sm rounded-md bg-indigo-600 text-white">Save</button>
        </div>
      </div>
    </div>`;
  document.body.insertAdjacentHTML("beforeend", html);
}
function saveEdit(id, keys) {
  const p = state.pos.find(x=>x.id===id);
  keys.forEach(k => { const el = document.getElementById("ed_"+k); if (el) p[k]=el.value; });
  saveState(); document.getElementById("editWrap").remove(); openDrawer(id); render(); toast("Saved");
}

/* ============================================================
   UPLOAD PO (PDF.js)
   ============================================================ */
function renderUpload() {
  if (state.currentRole !== "HQ_SALES") {
    return `<div class="bg-white rounded-lg border border-slate-200 p-10 text-center">
      <div class="text-lg font-semibold mb-1">Uploading is restricted</div>
      <div class="text-sm text-slate-500">Only the <b>HQ / Sales</b> role can upload new POs. Switch role in the top right.</div>
    </div>`;
  }
  return `
  <div class="grid grid-cols-2 gap-6">
    <div class="bg-white rounded-lg border border-slate-200 p-6">
      <div class="font-semibold mb-1">Upload a Purchase Order (PDF)</div>
      <div class="text-sm text-slate-500 mb-4">Drop a typed PDF here. The app will extract text and pre-fill the fields. Review and commit.</div>
      <div id="dropzone" class="border-2 border-dashed border-slate-300 rounded-lg p-10 text-center text-slate-500 hover:bg-slate-50 cursor-pointer">
        <div class="text-4xl mb-2">⬆</div>
        <div>Drag PDF here or click to browse</div>
        <input type="file" id="pdfFile" accept="application/pdf" class="hidden">
      </div>
      <div id="pdfStatus" class="text-xs text-slate-500 mt-3"></div>
      <details class="mt-4 text-sm">
        <summary class="text-slate-600 cursor-pointer">No PDF handy? Paste PO text directly</summary>
        <textarea id="pasteText" rows="6" placeholder="Paste raw PO text…" class="w-full border border-slate-300 rounded-md p-2 text-xs mt-2 font-mono"></textarea>
        <button onclick="decodeText(document.getElementById('pasteText').value)" class="mt-2 px-3 py-1.5 text-sm rounded-md border border-slate-300">Decode pasted text</button>
      </details>
    </div>
    <div class="bg-white rounded-lg border border-slate-200 p-6">
      <div class="font-semibold mb-3">Decoded preview</div>
      <div id="decodePreview" class="text-sm text-slate-500">No PO decoded yet.</div>
    </div>
  </div>
  <div class="mt-6 bg-white rounded-lg border border-slate-200 p-4">
    <div class="font-semibold mb-2 text-sm">How decoding works</div>
    <div class="text-xs text-slate-600 leading-relaxed">
      The decoder uses pattern matching on the extracted PDF text: it looks for a PO number, PO date, line items with part numbers, dimensions, colors, quantities, and unit prices. Real-world POs vary, so the preview always lets you correct fields before committing. For accuracy, swap this prototype's regex with a custom template per customer once you've seen 2–3 sample formats.
    </div>
  </div>
  `;
}
function wireUpload() {
  if (state.currentRole !== "HQ_SALES") return;
  const dz = document.getElementById("dropzone");
  const inp = document.getElementById("pdfFile");
  if (!dz || !inp) return;
  dz.addEventListener("click", () => inp.click());
  dz.addEventListener("dragover", e => { e.preventDefault(); dz.classList.add("bg-indigo-50"); });
  dz.addEventListener("dragleave", () => dz.classList.remove("bg-indigo-50"));
  dz.addEventListener("drop", e => { e.preventDefault(); dz.classList.remove("bg-indigo-50"); if (e.dataTransfer.files[0]) handlePdf(e.dataTransfer.files[0]); });
  inp.addEventListener("change", e => { if (e.target.files[0]) handlePdf(e.target.files[0]); });
}
async function handlePdf(file) {
  document.getElementById("pdfStatus").textContent = `Reading ${file.name}…`;
  try {
    pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
    const buf = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({data: buf}).promise;
    let text = "";
    for (let i=1; i<=pdf.numPages; i++) {
      const page = await pdf.getPage(i);
      const content = await page.getTextContent();
      text += content.items.map(it=>it.str).join(" ") + "\n";
    }
    document.getElementById("pdfStatus").innerHTML = `<span class="text-emerald-700">Extracted ${text.length.toLocaleString()} chars from ${pdf.numPages} page${pdf.numPages>1?"s":""}.</span>`;
    decodeText(text);
  } catch (e) {
    document.getElementById("pdfStatus").innerHTML = `<span class="text-red-600">Failed to read PDF: ${e.message}</span>`;
  }
}
function decodeText(text) {
  if (!text || !text.trim()) { document.getElementById("decodePreview").innerHTML = "Nothing to decode."; return; }
  const guess = guessFields(text);
  renderDecodePreview(guess, text);
}
function guessFields(text) {
  const clean = text.replace(/\s+/g," ");
  const out = {
    poNo: pick(clean, [/P\.?\s*O\.?\s*(?:Number|No|#)\s*[:#-]?\s*([A-Z0-9\-]{6,20})/i, /Purchase\s+Order\s*(?:No|#)?\s*[:#-]?\s*([A-Z0-9\-]{6,20})/i, /\b(5\d{7})\b/]),
    poDate: pickDate(clean, [/(?:PO|Order|Date)\s*(?:Date)?\s*[:#-]?\s*([0-9]{1,2}[\/\-][0-9]{1,2}[\/\-][0-9]{2,4})/i, /(?:PO|Order|Date)\s*(?:Date)?\s*[:#-]?\s*([A-Za-z]{3,9}\s+\d{1,2},?\s+\d{4})/]),
    stockingLocation: pickFrom(clean, state.master.stockingLocations),
    color: pickFrom(clean, ["GLOSSY BLACK","GLOSSY WHITE","SILVER FROST","CHARCOAL METALLIC","MATTE BLACK","PEPSI BLUE","VICTORY RED","INDIGO BLUE","ARMY GREEN","SAND SAHARA","SAND SAHARA MATTE","YELLOW","ORANGE","BRANDY WINE","PEWTER"])
  };
  // Lines — look for "2MM 49" x 96" ACP" style + qty
  const lines = [];
  const re = /(\d{1,3}MM\s*\d{1,3}[\"”']\s*x\s*\d{1,3}[\"”']\s*ACP)/gi;
  let m, idx=0;
  while ((m = re.exec(clean)) && idx<10) {
    const ctx = clean.slice(Math.max(0,m.index-160), Math.min(clean.length, m.index+220));
    const partNo = (ctx.match(/\b(6\d{5})\b/)||[])[1];
    const qty = (ctx.match(/(\d{2,4})\s*(?:SHEETS?|PCS?|EA)/i)||[])[1];
    const skids = (ctx.match(/(\d{1,2})\s*SKIDS?/i)||[])[1];
    const price = (ctx.match(/\$?\s*(\d{2,4}\.\d{2})/)||[])[1];
    lines.push({ lineNo: ++idx, partNo: partNo||"", size: m[1].toUpperCase(), color: out.color||"", sheets: Number(qty)||"", skids: Number(skids)||"", unitMsf: price?Number(price):"", extPo: "" });
  }
  out.lines = lines;
  return out;
}
function pick(text, patterns) { for (const p of patterns) { const m = text.match(p); if (m && m[1]) return m[1]; } return ""; }
function pickDate(text, patterns) { const raw = pick(text, patterns); if (!raw) return ""; const d = new Date(raw); return isNaN(d) ? raw : d.toISOString().slice(0,10); }
function pickFrom(text, list) { const up = text.toUpperCase(); for (const item of list) { if (up.includes(item.toUpperCase())) return item; } return ""; }

function renderDecodePreview(g, rawText) {
  const fields = [
    ["poNo","PO Number"],["poDate","PO Date"],["stockingLocation","Stocking location"],
    ["portOfDest","Port of destination"]
  ];
  document.getElementById("decodePreview").innerHTML = `
    <div class="grid grid-cols-2 gap-3 mb-4">
      ${fields.map(([k,l])=>`<div>
        <label class="text-xs text-slate-500">${l}</label>
        ${k==="stockingLocation"
          ? `<select id="dec_${k}" class="w-full border border-slate-300 rounded-md px-2 py-1.5 text-sm">
              <option value="">—</option>
              ${state.master.stockingLocations.map(o=>`<option ${g[k]===o?"selected":""} value="${o}">${o}</option>`).join("")}
            </select>`
          : `<input id="dec_${k}" value="${g[k]||""}" class="w-full border border-slate-300 rounded-md px-2 py-1.5 text-sm">`
        }
      </div>`).join("")}
    </div>
    <div class="text-xs font-semibold text-slate-500 uppercase mb-2">Line items (${g.lines.length})</div>
    <div class="border border-slate-200 rounded-md overflow-hidden mb-3">
      <table class="tbl w-full text-xs">
        <thead><tr><th>#</th><th>Part #</th><th>Size</th><th>Color</th><th class="text-right">Sheets</th><th class="text-right">Skids</th><th class="text-right">Unit</th></tr></thead>
        <tbody id="decLines">
          ${g.lines.map((l,i)=>`<tr>
            <td>${l.lineNo}</td>
            <td><input value="${l.partNo}" data-i="${i}" data-k="partNo" class="dec-line w-20 border-b border-slate-200 text-xs"></td>
            <td><input value="${l.size}" data-i="${i}" data-k="size" class="dec-line w-40 border-b border-slate-200 text-xs"></td>
            <td><input value="${l.color}" data-i="${i}" data-k="color" class="dec-line w-32 border-b border-slate-200 text-xs"></td>
            <td><input value="${l.sheets}" data-i="${i}" data-k="sheets" class="dec-line w-16 border-b border-slate-200 text-xs text-right"></td>
            <td><input value="${l.skids}" data-i="${i}" data-k="skids" class="dec-line w-12 border-b border-slate-200 text-xs text-right"></td>
            <td><input value="${l.unitMsf}" data-i="${i}" data-k="unitMsf" class="dec-line w-16 border-b border-slate-200 text-xs text-right"></td>
          </tr>`).join("") || `<tr><td colspan="7" class="text-center text-slate-400 py-3">No lines detected — add manually after committing.</td></tr>`}
        </tbody>
      </table>
    </div>
    <button onclick="commitDecoded()" class="px-4 py-2 bg-indigo-600 text-white text-sm rounded-md">Create PO from decoded data</button>
    <details class="mt-4">
      <summary class="text-xs text-slate-500">View raw extracted text</summary>
      <pre class="text-[10px] bg-slate-50 p-2 mt-2 max-h-40 overflow-auto whitespace-pre-wrap">${(rawText||"").slice(0,4000)}</pre>
    </details>
  `;
  window._decodedGuess = g;
}
function commitDecoded() {
  const g = window._decodedGuess || {lines:[]};
  // Read user-corrected lines back
  document.querySelectorAll(".dec-line").forEach(inp => {
    const i = +inp.dataset.i, k = inp.dataset.k;
    if (g.lines[i]) g.lines[i][k] = inp.value;
  });
  const poNo = document.getElementById("dec_poNo").value.trim();
  if (!poNo) { alert("PO Number is required."); return; }
  if (state.pos.some(p=>p.poNo===poNo)) { if (!confirm(`PO ${poNo} already exists. Add as a new rev?`)) return; }
  const stocking = document.getElementById("dec_stockingLocation").value;
  const port = state.master.portsOfEntry[stocking] || "";
  const lines = g.lines.map((l,i)=>({
    lineNo: l.lineNo||i+1, partNo: l.partNo||"", custPartNo:"", size: l.size||"",
    widthMm:"", lengthMm:"", color: l.color||"", qtyMsf:"", qtyM2: estM2(l), sheets: Number(l.sheets)||0,
    skids: Number(l.skids)||0, unitMsf: Number(l.unitMsf)||0, unitM2:"", extPo: estExt(l), leadTime: state.master.leadDays.standard
  }));
  const po = normalizePO({
    poNo, rev: 0, status: "PO Received",
    poDate: document.getElementById("dec_poDate").value || todayISO(),
    stockingLocation: stocking, portOfDest: port,
    skids: sumLines(lines, "skids"),
    poValue: sumLines(lines, "extPo"),
    totalM2: sumLines(lines, "qtyM2"),
    lines,
    history: [{stage:"PO Received", by: state.currentRole, at: todayISO(), note:"Uploaded via PDF decoder"}]
  }, state.pos.length);
  po.id = state.nextId++;
  state.pos.unshift(po);
  saveState();
  currentTab = "orders";
  render();
  toast(`PO ${poNo} created with ${lines.length} line${lines.length===1?"":"s"}.`);
}
function estM2(l) {
  // Try to compute from size string e.g. "2MM 49\" x 96\" ACP"
  const m = (l.size||"").match(/(\d{2,3})[\"”']\s*x\s*(\d{2,3})[\"”']/);
  if (!m) return "";
  const w = Number(m[1]) * 0.0254, h = Number(m[2]) * 0.0254;
  return (w*h*(Number(l.sheets)||0)).toFixed(2);
}
function estExt(l) {
  const m = estM2(l); if (!m) return "";
  // ext = m2 * unit_m2 if available else sheets * unit_msf / 1000
  if (l.unitMsf) return ((Number(l.sheets)*Number(l.unitMsf))/1000).toFixed(2);
  return "";
}

/* ============================================================
   ITEM SUMMARY
   ============================================================ */
function renderItemSummary() {
  const locs = state.master.stockingLocations;
  // Two pivots: Backlog (status before Container Loaded) and Shipped (Container Loaded or later)
  const itemMap = {}; // partNo -> {desc, byLoc: {loc: {backlog, shipped}}}
  state.pos.filter(p=>p.active!==false).forEach(p => {
    const shipped = stageIndex(p.status) >= stageIndex("Container Loaded");
    p.lines.forEach(l => {
      const key = l.partNo || l.size;
      if (!itemMap[key]) itemMap[key] = { desc: `${l.size||""} ${l.color||""}`.trim(), byLoc: {} };
      const loc = p.stockingLocation;
      itemMap[key].byLoc[loc] = itemMap[key].byLoc[loc] || {backlog:0, shipped:0};
      if (shipped) itemMap[key].byLoc[loc].shipped += Number(l.sheets)||0;
      else itemMap[key].byLoc[loc].backlog += Number(l.sheets)||0;
    });
  });
  const items = Object.entries(itemMap).sort();
  function pivotTable(kind) {
    return `<table class="tbl w-full text-xs">
      <thead><tr>
        <th>Code</th><th>Description</th>${locs.map(l=>`<th class="text-right">${l.split(",")[0]}</th>`).join("")}<th class="text-right">Total</th>
      </tr></thead>
      <tbody>
        ${items.map(([code, m])=>{
          const totals = locs.map(l => (m.byLoc[l]||{})[kind]||0);
          const sum = totals.reduce((a,b)=>a+b,0);
          if (!sum) return "";
          return `<tr><td class="font-mono">${code}</td><td>${m.desc}</td>${totals.map(v=>`<td class="text-right ${v?"font-semibold":"text-slate-300"}">${v||""}</td>`).join("")}<td class="text-right font-semibold">${sum}</td></tr>`;
        }).join("") || `<tr><td colspan="${locs.length+3}" class="text-center text-slate-400 py-6">No items</td></tr>`}
      </tbody>
    </table>`;
  }
  return `
    <div class="grid grid-cols-1 gap-6">
      <div class="bg-white rounded-lg border border-slate-200 p-4">
        <div class="font-semibold mb-3">Backlog (sheets) — orders not yet container-loaded</div>
        <div class="overflow-x-auto">${pivotTable("backlog")}</div>
      </div>
      <div class="bg-white rounded-lg border border-slate-200 p-4">
        <div class="font-semibold mb-3">Shipped (sheets) — container-loaded or later</div>
        <div class="overflow-x-auto">${pivotTable("shipped")}</div>
      </div>
    </div>
  `;
}
