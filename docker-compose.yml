services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: potracker
      POSTGRES_PASSWORD: potracker
      POSTGRES_DB: potracker
    ports:
      - "5435:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U potracker"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgresql://potracker:potracker@db:5432/potracker?schema=public
      JWT_SECRET: dev-secret-change-in-production-min-32-chars-long
      SUPER_ADMIN_EMAIL: admin@ufp.local
      SUPER_ADMIN_PASSWORD: ChangeMe123!
      FRONTEND_URL: http://localhost:4000
      NODE_ENV: production
      PORT: 4000
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
